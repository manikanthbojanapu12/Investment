<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Create a Stackly investment account.">
  <title>Stackly | Register Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="loader"><div class="spinner-border text-primary" role="status" aria-label="Loading"></div></div>
  <main class="auth-page auth-page-centered">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7 reveal">
          <form id="signupForm" class="auth-card auth-card-centered auth-card-signup-panel" novalidate>
            <a class="auth-back-link" href="index.html"><i class="bi bi-arrow-left"></i> Back to Home</a>
            <h2 class="h2 fw-bold mb-2">Create Account</h2>
            <p class="muted mb-4">Begin your wealth management journey.</p>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="signupName" class="form-label">Full Name</label>
                <input class="form-control" id="signupName" type="text" placeholder="Enter your full name" inputmode="text" autocomplete="name" data-letters-only="true">
                <div class="error-message" data-error-for="signupName"></div>
              </div>
              <div class="col-md-6">
                <label for="signupUsername" class="form-label">Username</label>
                <input class="form-control" id="signupUsername" type="text" placeholder="Create a username" inputmode="text" autocomplete="username" data-letters-only="true">
                <div class="error-message" data-error-for="signupUsername"></div>
              </div>
              <div class="col-md-6">
                <label for="signupEmail" class="form-label">Email Address</label>
                <input class="form-control" id="signupEmail" type="email" inputmode="email" placeholder="name@example.com" autocomplete="email" pattern="[^\s@]+@[^\s@]+\.[^\s@]+" title="Enter a valid email address">
                <div class="error-message" data-error-for="signupEmail"></div>
              </div>
              <div class="col-md-6">
                <label for="signupPhone" class="form-label">Phone Number</label>
                <input class="form-control" id="signupPhone" type="tel" placeholder="2125550188" inputmode="numeric" autocomplete="tel" pattern="[0-9]{10,15}" title="Enter 10 to 15 digits only" maxlength="15" data-digits-only="true">
                <div class="error-message" data-error-for="signupPhone"></div>
              </div>
              <div class="col-md-6 position-relative">
                <label for="signupPassword" class="form-label">Password</label>
                <input class="form-control pe-5" id="signupPassword" type="password" placeholder="Create a strong password" minlength="8" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$" title="Use 8+ characters with uppercase, lowercase, number, and symbol">
                <button class="password-toggle" type="button" data-toggle-password="signupPassword" aria-label="Show password"><i class="bi bi-eye"></i></button>
                <div class="error-message" data-error-for="signupPassword"></div>
              </div>
              <div class="col-md-6 position-relative">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input class="form-control pe-5" id="confirmPassword" type="password" placeholder="Re-enter your password">
                <button class="password-toggle" type="button" data-toggle-password="confirmPassword" aria-label="Show password"><i class="bi bi-eye"></i></button>
                <div class="error-message" data-error-for="confirmPassword"></div>
              </div>
              <div class="col-12">
                <label for="signupRole" class="form-label">Role</label>
                <select class="form-select" id="signupRole">
                  <option value="">Select role</option>
                  <option>Admin</option>
                  
                  <option>Client</option>
                </select>
                <div class="error-message" data-error-for="signupRole"></div>
              </div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" id="terms" type="checkbox">
                  <label class="form-check-label" for="terms">I accept the Terms & Conditions</label>
                </div>
                <div class="error-message" data-error-for="terms"></div>
              </div>
              <div class="col-12">
                <button class="btn btn-primary w-100" type="submit">Create Account</button>
              </div>
              <div class="col-12 text-center">
                <a class="text-primary" href="login.html">Already have an account? Login</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
