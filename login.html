<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Login to your secure Stackly investor portal.">
  <title>Stackly | Investor Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="loader"><div class="spinner-border text-primary" role="status" aria-label="Loading"></div></div>
  <main class="auth-page auth-page-centered">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-9 col-lg-6 col-xl-5 reveal">
          <form id="loginForm" class="auth-card auth-card-centered auth-card-login-panel" novalidate autocomplete="off">
            <a class="auth-back-link" href="index.html"><i class="bi bi-arrow-left"></i> Back to Home</a>
            <h2 class="h2 fw-bold mb-2">Login</h2>
            <p class="muted mb-4">Access your secure investor portal.</p>
            <div class="mb-3">
              <label for="loginEmail" class="form-label">Email</label>
              <input class="form-control" id="loginEmail" type="email" inputmode="email" placeholder="name@example.com" autocomplete="off" autocapitalize="off" spellcheck="false" pattern="[^\s@]+@[^\s@]+\.[^\s@]+" title="Enter a valid email address">
              <div class="error-message" data-error-for="loginEmail"></div>
            </div>
            <div class="mb-3 position-relative">
              <label for="loginPassword" class="form-label">Password</label>
              <input class="form-control pe-5" id="loginPassword" type="password" placeholder="Enter your password" autocomplete="new-password" autocapitalize="off" spellcheck="false">
              <button class="password-toggle" type="button" data-toggle-password="loginPassword" aria-label="Show password"><i class="bi bi-eye"></i></button>
              <div class="error-message" data-error-for="loginPassword"></div>
            </div>
            <div class="mb-3">
              <label for="loginRole" class="form-label">Role</label>
              <select class="form-select" id="loginRole" autocomplete="off">
                <option value="">Select role</option>
                <option>Admin</option>
                
                <option>Client</option>
              </select>
              <div class="error-message" data-error-for="loginRole"></div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" id="rememberMe" type="checkbox">
                <label class="form-check-label" for="rememberMe">Remember Me</label>
              </div>
              <a class="text-primary" href="404.html">Forgot Password?</a>
            </div>
            <button class="btn btn-primary w-100" type="submit">Login</button>
            <div class="auth-social mt-4">
              <span class="muted small">Connect with</span>
              <div class="d-flex justify-content-center gap-2 mt-2">
                <a class="social-link" href="404.html" aria-label="Continue with Facebook"><i class="bi bi-facebook"></i></a>
                <a class="social-link" href="404.html" aria-label="Continue with Google"><i class="bi bi-google"></i></a>
                <a class="social-link" href="404.html" aria-label="Continue with LinkedIn"><i class="bi bi-linkedin"></i></a>
              </div>
            </div>
            <p class="text-center mt-3 mb-0"><a class="text-primary" href="signup.html">Create a new account</a></p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
